name: CI — Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      # NOTE: Skipping data pipeline steps (run_preprocessing, run_training,
      # generate_artifacts) because the raw CSV is gitignored (453MB).
      # All model .joblib files are committed directly to the repo so the
      # integration tests can load them from the git checkout.

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
