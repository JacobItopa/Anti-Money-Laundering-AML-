name: CD — Build & Deploy to GCP Cloud Run

on:
  # Trigger manually from the GitHub Actions UI when GCP is ready
  workflow_dispatch:
  # OR automatically when a versioned release tag is pushed (e.g. v1.0.0)
  push:
    tags:
      - "v*.*.*"
  # NOTE: Automatic deploy on push to main is intentionally disabled until
  # GCP_PROJECT_ID and GCP_SA_KEY secrets are configured in repo Settings.

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: aml-fraud-api
  IMAGE_URI: gcr.io/${{ secrets.GCP_PROJECT_ID }}/aml-fraud-api:${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build Docker Image & Deploy to Cloud Run
    runs-on: ubuntu-latest
    # Only run if CI tests pass first
    needs: []

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker to use gcloud credentials
        run: gcloud auth configure-docker --quiet

      - name: Set up Python 3.11 for artifact generation
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies and generate model artifacts
        run: |
          pip install -r requirements.txt
          python run_preprocessing.py
          python run_training.py
          python generate_artifacts.py

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_URI .

      - name: Push image to Google Container Registry
        run: |
          docker push $IMAGE_URI

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE_URI \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --quiet

      - name: Print deployed service URL
        run: |
          gcloud run services describe $SERVICE_NAME \
            --platform managed \
            --region $REGION \
            --format "value(status.url)"
