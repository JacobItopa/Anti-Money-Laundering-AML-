name: CT — Scheduled Drift Check & Retrain

on:
  schedule:
    # Runs at 02:00 UTC on the 1st of every month
    - cron: "0 2 1 * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  drift-check-and-retrain:
    name: Detect Data Drift & Conditionally Retrain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run drift detection
        id: drift
        run: |
          # Exit code 1 signals drift was detected; 0 means data is stable
          python -c "
          import sys
          from src.models.drift_detection import detect_data_drift
          drifted = detect_data_drift(
              'data/interim/X_test.parquet',
              'data/interim/X_test.parquet'
          )
          sys.exit(1 if drifted else 0)
          " && echo "drift_detected=false" >> $GITHUB_OUTPUT || echo "drift_detected=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Retrain model if drift detected
        if: steps.drift.outputs.drift_detected == 'true'
        run: |
          echo "Drift detected — triggering full retraining pipeline..."
          python run_preprocessing.py
          python generate_artifacts.py
          python run_training.py
          python run_evaluation.py

      - name: Skip retraining if no drift
        if: steps.drift.outputs.drift_detected == 'false'
        run: echo "No drift detected. Model is stable — skipping retraining."
